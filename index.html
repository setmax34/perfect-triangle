<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kusursuz Üçgen</title>
    <style>
        /* Tema Değişkenleri */
        :root {
            --bg-color: #1a1a1a;
            --canvas-bg: #111;
            --text-color: #ffffff;
            --text-muted: #aaa;
            --border-color: #333;
            --btn-secondary-bg: #333;
            --btn-secondary-text: #fff;
            --btn-secondary-hover: #444;
            --select-bg: #252525;
        }

        [data-theme="light"] {
            --bg-color: #f8f9fa;
            --canvas-bg: #ffffff;
            --text-color: #212529;
            --text-muted: #6c757d;
            --border-color: #e0e0e0;
            --btn-secondary-bg: #e9ecef;
            --btn-secondary-text: #495057;
            --btn-secondary-hover: #dee2e6;
            --select-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 26px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        [data-theme="light"] h1 {
            color: #00b38f;
            text-shadow: none;
        }

        .header-score {
            width: 600px;
            max-width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--text-muted);
            padding: 0 5px;
            box-sizing: border-box;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease, transform 0.1s ease;
        }

        .icon-btn:hover {
            color: #00ffcc;
            transform: scale(1.1);
        }

        [data-theme="light"] .icon-btn:hover {
            color: #00b38f;
        }

        .custom-select {
            background-color: var(--select-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .custom-select:focus {
            border-color: #00ffcc;
        }

        #high-score {
            color: #ffcc00;
            font-weight: bold;
            margin-left: 5px;
        }

        [data-theme="light"] #high-score {
            color: #e6b800;
        }

        #canvas-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--border-color);
            transition: border-color 0.3s ease;
        }

        canvas {
            background-color: var(--canvas-bg);
            cursor: crosshair;
            display: block;
            transition: background-color 0.5s ease; /* Boyut yarılması efekti için geçiş yumuşatıldı */
        }

        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }

        #score-display {
            font-size: 54px;
            font-weight: bold;
            color: var(--text-color);
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
            transition: color 0.3s ease;
        }

        [data-theme="light"] #score-display {
            text-shadow: none;
        }

        #feedback {
            font-size: 16px;
            color: #00ffcc;
            margin-top: 5px;
            font-weight: 500;
            transition: color 0.3s;
        }

        [data-theme="light"] #feedback {
            color: #00b38f;
        }

        .controls {
            width: 600px;
            max-width: 100%;
            display: flex;
            gap: 10px;
            margin-top: 20px;
            box-sizing: border-box;
            padding: 0 5px;
        }

        button.control-btn {
            padding: 12px 0;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
        }

        .btn-clear {
            background-color: #00ffcc;
            color: #111;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2);
        }

        .btn-clear:hover {
            background-color: #00b38f;
            transform: translateY(-2px);
        }

        [data-theme="light"] .btn-clear {
            background-color: #00b38f;
            color: #fff;
        }

        .btn-share {
            background-color: var(--btn-secondary-bg);
            color: var(--btn-secondary-text);
            border: 1px solid var(--border-color);
        }

        .btn-share:hover {
            background-color: var(--btn-secondary-hover);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <h1>Kusursuz Üçgeni Çiz!</h1>

    <div class="header-score">
        <div class="header-buttons">
            <button id="btn-theme" class="icon-btn" title="Temayı Değiştir">🌙</button>
            <button id="btn-mute" class="icon-btn" title="Sesi Aç/Kapat">🔇</button>
            
            <select id="select-color" class="custom-select" title="Çizgi Rengi">
                <option value="default">✨ Varsayılan</option>
                <option value="#00ffcc">🟢 Neon Yeşil</option>
                <option value="#ff3366">💗 Canlı Pembe</option>
                <option value="#3399ff">🔵 Elektrik Mavisi</option>
                <option value="#ffcc00">🟡 Güneş Sarısı</option>
                <option value="#ffffff">⚪ Asil Beyaz</option>
            </select>

            <select id="select-brush" class="custom-select" title="Fırça Şekli">
                <option value="round">⚪ Daire Fırça</option>
                <option value="square">🔲 Kare Fırça</option>
                <option value="triangle">🔺 Üçgen Fırça</option>
            </select>
        </div>
        <div>En Yüksek Skor: <span id="high-score">0.0%</span></div>
    </div>

    <div id="canvas-container">
        <div id="ui-overlay">
            <div id="score-display">-%</div>
            <div id="feedback">Çizmeye başla...</div>
        </div>
        <canvas id="gameCanvas" width="600" height="500"></canvas>
    </div>

    <div class="controls">
        <button id="btn-clear" class="control-btn btn-clear">Temizle</button>
        <button id="btn-share" class="control-btn btn-share">Paylaş</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const feedback = document.getElementById('feedback');
        const clearBtn = document.getElementById('btn-clear');
        const shareBtn = document.getElementById('btn-share');
        const themeBtn = document.getElementById('btn-theme');
        const muteBtn = document.getElementById('btn-mute');
        const colorSelect = document.getElementById('select-color');
        const brushSelect = document.getElementById('select-brush');
        const highScoreDisplay = document.getElementById('high-score');

        let isDrawing = false;
        let points = [];
        let currentHighScore = parseFloat(localStorage.getItem('perfect_triangle_highscore')) || 0;
        let lastScore = 0;
        let drawSoundThrottle = 0;
        
        let currentTheme = localStorage.getItem('perfect_triangle_theme') || 'dark';
        let isMuted = true; 

        let particles = [];
        let animationFrameId = null;
        let audioCtx = null;

        highScoreDisplay.innerText = currentHighScore.toFixed(1) + "%";
        applyTheme();
        updateMuteButtonUI();

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function applyTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            themeBtn.innerText = currentTheme === 'light' ? "☀️" : "🌙";
            resetCanvasBackground();
        }

        function resetCanvasBackground() {
            canvas.style.backgroundColor = "";
        }

        function updateMuteButtonUI() {
            muteBtn.innerText = isMuted ? "🔇" : "🔊";
            if (isMuted) muteBtn.style.color = "#ff3366";
            else muteBtn.style.color = "";
        }

        function getActiveColor() {
            const val = colorSelect.value;
            if (val === 'default') {
                return currentTheme === 'dark' ? '#00ffcc' : '#00b38f';
            }
            return val;
        }

        // --- SES MOTORU ---
        function playTone(freq, type, duration, vol) {
            if (isMuted) return;
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) { console.log(e); }
        }

        function playDrawSound() {
            drawSoundThrottle++;
            if (drawSoundThrottle % 4 === 0) {
                playTone(180 + (Math.random() * 40), 'sine', 0.04, 0.03);
            }
        }

        function playScoreSound(score, isNewRecord, isBillCipher = false) {
            if (isBillCipher) {
                // Bill Cipher için gelişmiş glitch'li ve sismik frekans düşüşlü boyut sesi
                try {
                    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioCtx.state === 'suspended') audioCtx.resume();

                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(260, audioCtx.currentTime);
                    // Ses kayma (Glitch) efekti
                    osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.6);
                    
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.6);

                    // Arkadan gelen ikinci tekinsiz çınlama
                    setTimeout(() => playTone(110, 'square', 0.4, 0.15), 100);
                } catch(e){}
                return;
            }

            if (isNewRecord && score > 10) {
                setTimeout(() => playTone(523.25, 'sine', 0.1, 0.12), 0);   
                setTimeout(() => playTone(659.25, 'sine', 0.1, 0.12), 80);  
                setTimeout(() => playTone(783.99, 'sine', 0.1, 0.12), 160); 
                setTimeout(() => playTone(1046.50, 'sine', 0.4, 0.18), 240); 
            } else if (score > 85) {
                setTimeout(() => playTone(523.25, 'sine', 0.12, 0.12), 0);   
                setTimeout(() => playTone(659.25, 'sine', 0.12, 0.12), 80); 
                setTimeout(() => playTone(783.99, 'sine', 0.25, 0.15), 160);   
            } else if (score > 65) {
                playTone(440, 'sine', 0.2, 0.12); 
            } else {
                setTimeout(() => playTone(200, 'triangle', 0.15, 0.15), 0);   
                setTimeout(() => playTone(160, 'triangle', 0.25, 0.15), 120);  
            }
        }

        // --- KONFETİ EFEKTİ ---
        function createConfetti() {
            particles = [];
            const colors = ['#00ffcc', '#ff3366', '#ffcc00', '#00b38f', '#ff5500', '#3399ff'];
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * -100 - 10,
                    size: Math.random() * 6 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedX: Math.random() * 4 - 2,
                    speedY: Math.random() * 3 + 2,
                    rotation: Math.random() * 360,
                    rotationSpeed: Math.random() * 4 - 2
                });
            }
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            animateConfetti();
        }

        function animateConfetti() {
            let activeParticles = false;
            particles.forEach(p => {
                if (p.y < canvas.height) {
                    activeParticles = true;
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rotation += p.rotationSpeed;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                }
            });
            if (activeParticles && !isDrawing) {
                animationFrameId = requestAnimationFrame(animateConfetti);
            }
        }

        // --- EASTER EGG: ORİJİNAL TUĞLA DESENLİ BILL CIPHER ÇİZİCİ ---
        function spawnBillCipher() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2 + 20;

            ctx.save();
            
            // Boyut Yarılması Arka Plan Efekti (Korkutucu Ambiyans)
            canvas.style.backgroundColor = currentTheme === 'dark' ? '#2d1133' : '#f5e6ff';

            // Göz Parıltısı / Arka Aura
            let gradient = ctx.createRadialGradient(cx, cy, 10, cx, cy, 180);
            gradient.addColorStop(0, 'rgba(255, 230, 100, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(cx, cy, 180, 0, 2 * Math.PI);
            ctx.fill();

            // Bill Gövde Parametreleri
            const topY = cy - 110;
            const bottomY = cy + 60;
            const leftX = cx - 95;
            const rightX = cx + 95;

            // 1. Piramit Ana Gövde
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#000000';
            ctx.fillStyle = '#ffeb3b'; // Canlı Bill Sarısı
            ctx.beginPath();
            ctx.moveTo(cx, topY);
            ctx.lineTo(rightX, bottomY);
            ctx.lineTo(leftX, bottomY);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 2. Orijinal Tuğla Çizgileri (Gövde Sınırlarına Göre Kırpılmış Yatay/Dikey Çizgiler)
            ctx.clip(); // Çizgilerin üçgen dışına taşmasını engeller
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.lineWidth = 2;
            
            // Yatay Tuğla Çizgileri (Gövdenin alt yarısında yoğunlaşır)
            const rowY1 = cy + 10;
            const rowY2 = cy + 35;
            ctx.beginPath();
            ctx.moveTo(leftX, rowY1); ctx.lineTo(rightX, rowY1);
            ctx.moveTo(leftX, rowY2); ctx.lineTo(rightX, rowY2);
            ctx.stroke();

            // Dikey Tuğla Derzleri
            ctx.beginPath();
            // Alt Satır Derzleri
            ctx.moveTo(cx - 40, rowY2); ctx.lineTo(cx - 40, bottomY);
            ctx.moveTo(cx + 40, rowY2); ctx.lineTo(cx + 40, bottomY);
            // Orta Satır Derzleri
            ctx.moveTo(cx, rowY1); ctx.lineTo(cx, rowY2);
            ctx.moveTo(cx - 60, rowY1); ctx.lineTo(cx - 60, rowY2);
            ctx.moveTo(cx + 60, rowY1); ctx.lineTo(cx + 60, rowY2);
            ctx.stroke();

            ctx.restore(); // Kırpmayı kaldırıp normal çizime devam et
            ctx.save();

            // 3. İkonik Silindir Şapka
            ctx.fillStyle = '#000000';
            // Şapka Tabanı (Eğik/Düz Duruş)
            ctx.fillRect(cx - 45, topY - 5, 90, 7);
            // Uzun Şapka Gövdesi
            ctx.fillRect(cx - 18, topY - 75, 36, 70);

            // 4. İnce Siyah Kollar ve Bacaklar
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 4.5;
            ctx.lineCap = 'round';
            
            // İnce Bacaklar
            ctx.beginPath();
            ctx.moveTo(cx - 25, bottomY);  ctx.lineTo(cx - 30, bottomY + 55); // Sol bacak
            ctx.moveTo(cx + 25, bottomY);  ctx.lineTo(cx + 30, bottomY + 55); // Sağ bacak
            // Ayaklar (Düz Çizgi Ayakkabılar)
            ctx.moveTo(cx - 30, bottomY + 55); ctx.lineTo(cx - 45, bottomY + 55);
            ctx.moveTo(cx + 30, bottomY + 55); ctx.lineTo(cx + 45, bottomY + 55);

            // İnce Kollar (Orijinal sinsi duruş)
            ctx.moveTo(cx - 50, cy); ctx.lineTo(cx - 95, cy - 15); // Sol kol havaya
            ctx.moveTo(cx + 50, cy); ctx.lineTo(cx + 95, cy - 15); // Sağ kol havaya
            ctx.stroke();

            // 5. Şık Siyah Papyon
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.moveTo(cx, cy + 45);
            ctx.lineTo(cx - 16, cy + 38);
            ctx.lineTo(cx - 16, cy + 52);
            ctx.moveTo(cx, cy + 45);
            ctx.lineTo(cx + 16, cy + 38);
            ctx.lineTo(cx + 16, cy + 52);
            ctx.closePath();
            ctx.fill();

            // 6. MERKEZİ BÜYÜK GÖZ (Her Şeyi Gören Göz)
            const eyeY = cy - 15;
            ctx.strokeStyle = '#000000';
            ctx.fillStyle = '#ffffff';
            ctx.lineWidth = 3.5;
            
            // Göz Akı
            ctx.beginPath();
            ctx.ellipse(cx, eyeY, 26, 16, 0, 0, 2 * Math.PI);
            ctx.fill();
            ctx.stroke();
            
            // Dikey Siyah İnce Göz Bebeği
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.ellipse(cx, eyeY, 4.5, 13, 0, 0, 2 * Math.PI);
            ctx.fill();

            // Kirpikler (3 Üstte, 3 Altta Orijinal Yapı)
            ctx.lineWidth = 3;
            ctx.beginPath();
            // Üsttekiler
            ctx.moveTo(cx, eyeY - 16); ctx.lineTo(cx, eyeY - 25);
            ctx.moveTo(cx - 16, eyeY - 11); ctx.lineTo(cx - 24, eyeY - 19);
            ctx.moveTo(cx + 16, eyeY - 11); ctx.lineTo(cx + 24, eyeY - 19);
            // Alttakiler
            ctx.moveTo(cx, eyeY + 16); ctx.lineTo(cx, eyeY + 25);
            ctx.moveTo(cx - 16, eyeY + 11); ctx.lineTo(cx - 24, eyeY + 19);
            ctx.moveTo(cx + 16, eyeY + 11); ctx.lineTo(cx + 24, eyeY + 19);
            ctx.stroke();

            ctx.restore();
        }

        // --- ETKİNLİKLER ---
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e.touches[0]); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
        window.addEventListener('touchend', stopDrawing);

        clearBtn.addEventListener('click', clearCanvas);
        shareBtn.addEventListener('click', shareScore);
        
        themeBtn.addEventListener('click', () => {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('perfect_triangle_theme', currentTheme);
            applyTheme();
        });

        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            updateMuteButtonUI();
            if (!isMuted) playTone(440, 'sine', 0.08, 0.1); 
        });

        function startDrawing(e) {
            if (animationFrameId) cancelAnimationFrame(animationFrameId); 
            resetCanvasBackground(); // Önceki olası Bill Cipher arka planını temizler
            
            isDrawing = true;
            points = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const pos = getMousePos(e);
            points.push(pos);
            
            feedback.innerText = "Çiziliyor...";
            scoreDisplay.innerText = "-%";
            scoreDisplay.style.color = currentTheme === 'dark' ? '#fff' : '#212529';

            ctx.lineWidth = 5;
            ctx.strokeStyle = getActiveColor();
            drawCustomBrush(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getMousePos(e);
            points.push(pos);
            
            const brushType = brushSelect.value;
            if (brushType === 'round') {
                ctx.beginPath();
                ctx.moveTo(points[points.length - 2].x, points[points.length - 2].y);
                ctx.lineTo(pos.x, pos.y);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            } else {
                drawCustomBrush(pos.x, pos.y);
            }
            
            playDrawSound();
        }

        function drawCustomBrush(x, y) {
            const brushType = brushSelect.value;
            ctx.fillStyle = getActiveColor();
            
            if (brushType === 'square') {
                ctx.fillRect(x - 3, y - 3, 6, 6);
            } else if (brushType === 'triangle') {
                ctx.beginPath();
                ctx.moveTo(x, y - 5);
                ctx.lineTo(x - 5, y + 4);
                ctx.lineTo(x + 5, y + 4);
                ctx.closePath();
                ctx.fill();
            }
        }

        function stopDrawing() {
            if (!isDrawing) return;
            isDrawing = false;
            
            if (points.length < 30) {
                feedback.innerText = "Çok küçük çizdin, tekrar dene!";
                return;
            }

            ctx.beginPath();
            ctx.moveTo(points[points.length - 1].x, points[points.length - 1].y);
            ctx.lineTo(points[0].x, points[0].y);
            ctx.strokeStyle = getActiveColor();
            ctx.stroke();

            calculateTriangleScore();
        }

        function clearCanvas() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            resetCanvasBackground();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            scoreDisplay.innerText = "-%";
            feedback.innerText = "Çizmeye başla...";
            scoreDisplay.style.color = currentTheme === 'dark' ? '#fff' : '#212529';
            playTone(320, 'sine', 0.04, 0.08);
        }

        function calculateTriangleScore() {
            const dist = (a, b) => Math.sqrt((a.x - b.x)**2 + (a.y - b.y)**2);

            let p1 = points[0];
            let p2 = points[0];
            let maxDist1 = 0;
            points.forEach(p => {
                let d = dist(p1, p);
                if (d > maxDist1) {
                    maxDist1 = d;
                    p2 = p;
                }
            });

            let p3 = points[0];
            let maxDist2 = 0;
            points.forEach(p => {
                let d = dist(p1, p) + dist(p2, p);
                if (d > maxDist2) {
                    maxDist2 = d;
                    p3 = p;
                }
            });

            let a = dist(p1, p2);
            let b = dist(p2, p3);
            let c = dist(p3, p1);

            let avgSide = (a + b + c) / 3;
            let sideDeviation = (Math.abs(a - avgSide) + Math.abs(b - avgSide) + Math.abs(c - avgSide)) / avgSide;

            const getAngle = (side1, side2, oppSide) => {
                return Math.acos((side1**2 + side2**2 - oppSide**2) / (2 * side1 * side2)) * (180 / Math.PI);
            };

            let angleA = getAngle(b, c, a);
            let angleB = getAngle(a, c, b);
            let angleC = getAngle(a, b, c);

            let angleDeviation = (Math.abs(angleA - 60) + Math.abs(angleB - 60) + Math.abs(angleC - 60)) / 180;

            let totalDeviation = (sideDeviation * 0.5) + (angleDeviation * 0.5);
            let finalScore = 100 - (totalDeviation * 120);
            
            finalScore = Math.max(0, Math.min(100, finalScore));
            lastScore = parseFloat(finalScore.toFixed(1));

            scoreDisplay.innerText = lastScore.toFixed(1) + "%";
            
            let isNewRecord = lastScore > currentHighScore;

            // Sadece Sarı Renk Seçildiğinde (`#ffcc00`) ve %15 Şansla Tetiklenme Şartı
            let isYellowSelected = (colorSelect.value === '#ffcc00');
            let isBillCipherSpawned = isYellowSelected && (Math.random() < 0.15);

            if (isBillCipherSpawned) {
                scoreDisplay.style.color = '#e6b800';
                feedback.style.color = '#ffeb3b';
                feedback.innerText = "👁️ \"GERÇEKLİK BİR İLLÜZYONDUR, EVREN BİR HOLOGRAM!\"";
                spawnBillCipher(); // Gerçekçi Bill Cipher'ı çiz
                playScoreSound(lastScore, false, true); // Korkutucu glitch sesini ver
            } else {
                feedback.style.color = ""; // Rengi eski haline döndür
                if (isNewRecord && lastScore > 10) {
                    scoreDisplay.style.color = '#ffcc00'; 
                    feedback.innerText = "YENİ REKOR! Muazzam bir çizim çıkardın! 🏆";
                    createConfetti(); 
                } else if (lastScore > 85) {
                    scoreDisplay.style.color = getActiveColor(); 
                    feedback.innerText = "Muhteşem! Geometri ustası mısın be!";
                } else if (lastScore > 65) {
                    scoreDisplay.style.color = '#ffcc00';
                    feedback.innerText = "Fena değil, kenarları daha eşit tutmaya çalış.";
                } else {
                    scoreDisplay.style.color = '#ff3366';
                    feedback.innerText = "Bu biraz yamuk oldu sanki? Tekrar dene!";
                }
                playScoreSound(lastScore, isNewRecord, false);
            }

            if (isNewRecord) {
                currentHighScore = lastScore;
                localStorage.setItem('perfect_triangle_highscore', currentHighScore);
                highScoreDisplay.innerText = currentHighScore.toFixed(1) + "%";
            }

            // Köşe noktaları (Bill çıktığında estetiği kapatmasın diye çizilmez)
            if (!isBillCipherSpawned) {
                ctx.fillStyle = '#ff3366';
                [p1, p2, p3].forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
                    ctx.fill();
                });
            }
        }

        function shareScore() {
            const text = `Kusursuz Üçgen oyununda skorum: %${lastScore || 0}! Sen de dene: ${window.location.href}`;
            if (navigator.share) {
                navigator.share({ title: 'Kusursuz Üçgen', text: text, url: window.location.href }).catch(err => console.log(err));
            } else {
                navigator.clipboard.writeText(text);
                alert("Skor mesajı kopyalandı!");
            }
        }
    </script>
</body>
